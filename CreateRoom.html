<!DOCTYPE html>
<!-- saved from url=(0052)https://se.ifmo.ru/~s311779/Whiteboard/OpenRoom.HTML -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание комнаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2c2c2c, #2c2c2c);
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            width: 100%;
        }
        
        .description {
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
            max-width: 600px;
            font-size: 24px;
            opacity: 0.9;
        }
        
        .upload-section {
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            /* background: rgba(255, 171, 61, 0.199);
            border: 2px solid #FFAA3DFF; */
        }
        
        .file-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.064);
            border: 2px solid rgba(255, 255, 255, 0.212);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            transition: all 0.3s ease;
        }
        
        .file-input:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .file-input::file-selector-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            margin-right: 15px;
            transition: all 0.3s ease;
        }
        
        .file-input::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .action-btn {
            padding: 15px 30px;
            background: rgba(255, 171, 61, 0.199);
            border: 2px solid #FFAA3DFF;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .action-btn:hover {
             background: rgba(255, 171, 61, 0.331);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .info-title {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 20px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .info-content {
            line-height: 1.6;
            text-align: center;
            opacity: 0.9;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            width: 100%;
            backdrop-filter: blur(5px);
        }

        .created {
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 24px;
            opacity: 0.9;

            padding: 30px;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;

            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Создайте комнату</h1>

        <div class="description">
           Загрузите файл .pdf (Вашу презентацию), чтобы создать комнату. Комната будет удалена через 2 дня
        </div>
        
        <div class="upload-section">
            <input type="file" id="pdfFile" accept=".pdf"  class="file-input">
            <button onclick="uploadFile()" class="action-btn">Загрузить PDF</button>
        </div>

        <div class="created" id="created">
            Комната успешно создана!
            <div id="roomNumber">
                Номер комнаты 3456
            </div>
            <button onclick="redirect()" class="action-btn">Перейти</button>
        </div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            
            if (!file || file.type !== 'application/pdf') {
                alert('Пожалуйста, выберите PDF-файл.');
                return;
            }

            const formData = new FormData();
            formData.append('pdfFile', file);

            const MAX_FILE_SIZE = 1 * 1024 * 1024; // 1 МБ
    
            if (file.size > MAX_FILE_SIZE) {
                alert(`Файл слишком большой. Максимальный размер: ${MAX_FILE_SIZE / 1024 / 1024} МБ`);
                return;
            }

            try {
                const response = await fetch('create-new-room.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.success) {
                    setCookie("RoomNumber", result.room.Number);
                    successCreated(result.room.Number);
                } else {
                    alert('Ошибка: ' + result.message);
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        function successCreated(roomNumber) {
            //window.location.href = `PDFViewer.HTML`;

            section = document.getElementById("created");
            section.style.visibility = "visible";

            text = document.getElementById("roomNumber");
            text.innerText = "Номер комнаты " + roomNumber;
        }

        function redirect() {
            window.location.href = `PDFViewer.HTML`;
        }

        function setCookie(name, value, days = 1) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i];
                while (cookie.charAt(0) === ' ') {
                    cookie = cookie.substring(1);
                }
                if (cookie.indexOf(nameEQ) === 0) {
                    return cookie.substring(nameEQ.length, cookie.length);
                }
            }
            return null;
        }
    </script>

</body></html>
