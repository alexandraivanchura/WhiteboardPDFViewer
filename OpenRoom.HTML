<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Selection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .main-content {
            display: flex;
            gap: 100px;
            width: 100%;
            align-items: flex-start;
        }
        
        .left-panel {
            flex: 0 0 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .search-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .search-input:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .search-input:focus {
            outline: none;
            border-color: white;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        .key {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .key:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .key:active {
            transform: translateY(0);
        }
        
        .key.clear {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.3), rgba(255, 80, 80, 0.5));
        }
        
        .key.clear:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.5), rgba(255, 80, 80, 0.7));
        }
        
        .key.backspace {
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.3), rgba(255, 180, 80, 0.5));
        }
        
        .key.backspace:hover {
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.5), rgba(255, 180, 80, 0.7));
        }
        
        .rooms-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .room-btn {
            padding: 25px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .room-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .room-btn:active {
            transform: translateY(0);
        }
        
        .room-btn.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .room-btn.highlighted {
            background: linear-gradient(135deg, rgba(100, 255, 100, 0.3), rgba(80, 255, 80, 0.5));
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(100, 255, 100, 0.5);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            width: 100%;
            backdrop-filter: blur(5px);
        }
        
        .search-results {
            text-align: center;
            margin: 15px 0;
            font-size: 18px;
            min-height: 24px;
            width: 100%;
        }
        
        .panel-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Выберите комнату</h1>
        
        <div class="main-content">
            <div class="left-panel">
                <div class="panel-title">Введите номер комнаты</div>
                <div class="search-container">
                    <input type="text" class="search-input" id="search-input" placeholder="Enter room number..." readonly>
                    
                    <div class="keyboard">
                        <div class="key" data-key="1">1</div>
                        <div class="key" data-key="2">2</div>
                        <div class="key" data-key="3">3</div>
                        <div class="key" data-key="4">4</div>
                        <div class="key" data-key="5">5</div>
                        <div class="key" data-key="6">6</div>
                        <div class="key" data-key="7">7</div>
                        <div class="key" data-key="8">8</div>
                        <div class="key" data-key="9">9</div>
                        <div class="key clear" data-key="clear">Clear</div>
                        <div class="key" data-key="0">0</div>
                        <div class="key backspace" data-key="backspace">⌫</div>
                    </div>
                    
                    <div class="search-results" id="search-results"></div>
                </div>
            </div>
            
            <!-- Правая панель - список комнат -->
            <div class="right-panel">
                <div class="panel-title">Или выберите из списка</div>
                
                <div class="loading" id="loading">
                    <p>Loading available rooms...</p>
                </div>

                <div id="error-container"></div>
                
                <div id="rooms-container" class="rooms-container" style="display: none;">
                    <!-- Room buttons will be dynamically added here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRoom = null;
        let roomsData = null;
        let filteredRooms = [];

        document.addEventListener('DOMContentLoaded', function() {
            const loadingEl = document.getElementById('loading');
            const errorContainer = document.getElementById('error-container');
            const roomsContainer = document.getElementById('rooms-container');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            
            // Initialize keyboard
            initializeKeyboard();
            
            loadRoomData();
            
            async function loadRoomData() {
                try {
                    const response = await fetch('get-file.php');
                    const result = await response.json();
                    
                    if (result.success) {
                        roomsData = result.data;
                        filteredRooms = [...roomsData.Rooms];
                        displayRooms(filteredRooms);
                        loadingEl.style.display = 'none';
                        roomsContainer.style.display = 'grid';
                    } else {
                        throw new Error(result.message || 'Failed to load room data');
                    }
                } catch (error) {
                    console.error('Error loading room data:', error);
                    showError('Failed to load room data: ' + error.message);
                    loadingEl.style.display = 'none';
                }
            }
            
            function initializeKeyboard() {
                const keys = document.querySelectorAll('.key');
                
                keys.forEach(key => {
                    key.addEventListener('click', function() {
                        const keyValue = this.getAttribute('data-key');
                        handleKeyPress(keyValue);
                    });
                });
                
                // Also allow physical keyboard input
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key >= '0' && e.key <= '9') {
                        handleKeyPress(e.key);
                        e.preventDefault();
                    } else if (e.key === 'Backspace') {
                        handleKeyPress('backspace');
                        e.preventDefault();
                    } else if (e.key === 'Escape' || e.key === 'Delete') {
                        handleKeyPress('clear');
                        e.preventDefault();
                    } else if (e.key === 'Enter') {
                        selectFirstFilteredRoom();
                        e.preventDefault();
                    }
                });
                
                // Remove readonly to allow focus
                searchInput.removeAttribute('readonly');
                searchInput.focus();
            }
            
            function handleKeyPress(key) {
                const currentValue = searchInput.value;
                
                switch(key) {
                    case 'clear':
                        searchInput.value = '';
                        break;
                    case 'backspace':
                        searchInput.value = currentValue.slice(0, -1);
                        break;
                    default:
                        if (currentValue.length < 6) { // Limit input length
                            searchInput.value = currentValue + key;
                        }
                        break;
                }
                
                filterRooms(searchInput.value);
            }
            
            function filterRooms(searchTerm) {
                if (!searchTerm) {
                    filteredRooms = [...roomsData.Rooms];
                    searchResults.textContent = '';
                } else {
                    filteredRooms = roomsData.Rooms.filter(room => 
                        room.Number.includes(searchTerm)
                    );
                    
                    if (filteredRooms.length === 0) {
                        searchResults.textContent = 'No rooms found matching "' + searchTerm + '"';
                        searchResults.style.color = '#ff9999';
                    } else {
                        searchResults.textContent = `Found ${filteredRooms.length} room(s)`;
                        searchResults.style.color = '#99ff99';
                        
                        // Auto-select if only one room matches
                        if (filteredRooms.length === 1) {
                            highlightRoom(filteredRooms[0].Number);
                        }
                    }
                }
                
                displayRooms(filteredRooms);
            }
            
            function highlightRoom(roomNumber) {
                document.querySelectorAll('.room-btn').forEach(btn => {
                    btn.classList.remove('highlighted');
                    if (btn.getAttribute('data-room') === roomNumber) {
                        btn.classList.add('highlighted');
                        btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }
            
            function selectFirstFilteredRoom() {
                if (filteredRooms.length > 0) {
                    const roomNumber = filteredRooms[0].Number;
                    setCookie("RoomNumber", roomNumber);
                    window.location.href = `PDFViewer.HTML`;
                }
            }
            
            function displayRooms(rooms) {
                roomsContainer.innerHTML = '';
                
                if (!rooms || rooms.length === 0) {
                    if (searchInput.value) {
                        // Don't show error if we're searching and no results
                        return;
                    }
                    showError('No rooms available');
                    return;
                }
                
                // Sort rooms by number
                rooms.sort((a, b) => {
                    const numA = parseInt(a.Number);
                    const numB = parseInt(b.Number);
                    return numA - numB;
                });
                
                rooms.forEach(room => {
                    const roomBtn = document.createElement('div');
                    roomBtn.className = 'room-btn';
                    roomBtn.textContent = room.Number;
                    roomBtn.setAttribute('data-room', room.Number);
                    
                    roomBtn.addEventListener('click', function() {
                        document.querySelectorAll('.room-btn').forEach(btn => {
                            btn.classList.remove('selected');
                        });
                        
                        roomBtn.classList.add('selected');
                        selectedRoom = room.Number;
                        
                        setCookie("RoomNumber", selectedRoom);
                        window.location.href = `PDFViewer.HTML`;
                    });
                    
                    roomsContainer.appendChild(roomBtn);
                });
                
                // Apply highlighting without causing recursion
                applySearchHighlighting();
            }
            
            function applySearchHighlighting() {
                // Only apply highlighting if there's an active search
                if (!searchInput.value) {
                    document.querySelectorAll('.room-btn').forEach(btn => {
                        btn.classList.remove('highlighted');
                    });
                    return;
                }
                
                // Highlight rooms that match the current search
                document.querySelectorAll('.room-btn').forEach(btn => {
                    const roomNumber = btn.getAttribute('data-room');
                    if (roomNumber.includes(searchInput.value)) {
                        btn.classList.add('highlighted');
                    } else {
                        btn.classList.remove('highlighted');
                    }
                });
            }
            
            function showError(message) {
                errorContainer.innerHTML = '<div class="error">' + message + '</div>';
            }
        });

        function setCookie(name, value, days = 1) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i];
                while (cookie.charAt(0) === ' ') {
                    cookie = cookie.substring(1);
                }
                if (cookie.indexOf(nameEQ) === 0) {
                    return cookie.substring(nameEQ.length, cookie.length);
                }
            }
            return null;
        }
    </script>
</body>
</html>
