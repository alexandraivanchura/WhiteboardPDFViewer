<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Selection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #2a5298;
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .description {
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 600px;
        }
        
        .rooms-container {
        }
        
        .room-btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            width: 80%;
            align-self: center;
            margin-bottom: 3%;
        }
        
        .room-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .room-btn.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .action-btn {
            padding: 12px 25px;
            background: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .action-btn:hover {
            background: #45a049;
        }
        
        .action-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .info-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .info-content {
            line-height: 1.5;
        }
        
        @media (max-width: 600px) {
            .rooms-container {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            
            .room-btn {
                padding: 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select a Room</h1>
        
        <div class="loading" id="loading">
            <p>Loading available rooms...</p>
        </div>

        <div id="error-container"></div>
        
        <div id="rooms-container" class="rooms-container" style="display: none;">
            <!-- Room buttons will be dynamically added here -->
        </div>
    </div>

    <script>
        let selectedRoom = null;
        let roomsData = null;

        document.addEventListener('DOMContentLoaded', function() {
            const loadingEl = document.getElementById('loading');
            const errorContainer = document.getElementById('error-container');
            const roomsContainer = document.getElementById('rooms-container');
            
            loadRoomData();
            
            async function loadRoomData() {
                try {
                    const response = await fetch('get-file.php');
                    const result = await response.json();
                    
                    if (result.success) {
                        roomsData = result.data;
                        displayRooms(roomsData.Rooms);
                        loadingEl.style.display = 'none';
                        roomsContainer.style.display = 'grid';
                    } else {
                        throw new Error(result.message || 'Failed to load room data');
                    }
                } catch (error) {
                    console.error('Error loading room data:', error);
                    showError('Failed to load room data: ' + error.message);
                    loadingEl.style.display = 'none';
                }
            }
            
            function displayRooms(rooms) {
                roomsContainer.innerHTML = '';
                
                if (!rooms || rooms.length === 0) {
                    showError('No rooms available');
                    return;
                }
                
                // Sort rooms by number
                rooms.sort((a, b) => {
                    const numA = parseInt(a.Number);
                    const numB = parseInt(b.Number);
                    return numA - numB;
                });
                
                rooms.forEach(room => {
                    const roomBtn = document.createElement('div');
                    roomBtn.className = 'room-btn';
                    roomBtn.textContent = `Room ${room.Number}`;
                    roomBtn.setAttribute('data-room', room.Number);
                    
                    roomBtn.addEventListener('click', function() {
                        document.querySelectorAll('.room-btn').forEach(btn => {
                            btn.classList.remove('selected');
                        });
                        
                        roomBtn.classList.add('selected');
                        selectedRoom = room.Number;
                        
                        setCookie("RoomNumber", selectedRoom);
                        window.location.href = `PDFViewer.HTML`;
                    });
                    roomsContainer.appendChild(roomBtn);
                });
            }
            
            function showError(message) {
                errorContainer.innerHTML = '<div class="error">' + message + '</div>';
            }
        });

        function setCookie(name, value, days = 1) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i];
                while (cookie.charAt(0) === ' ') {
                    cookie = cookie.substring(1);
                }
                if (cookie.indexOf(nameEQ) === 0) {
                    return cookie.substring(nameEQ.length, cookie.length);
                }
            }
            return null;
        }
    </script>
</body>
</html>
