<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Presentation Viewer</title>
    
    <script>
        // Basic polyfills for very old environments
        if (!Array.prototype.at) {
            Array.prototype.at = function(index) {
                var n = index < 0 ? this.length + index : index;
                return this[n];
            };
        }
        
        if (!String.prototype.at) {
            String.prototype.at = function(index) {
                return this.charAt(index >= 0 ? index : this.length + index);
            };
        }
        
        if (typeof structuredClone === 'undefined') {
            window.structuredClone = function(obj) {
                return JSON.parse(JSON.stringify(obj));
            };
        }
    </script>

    <!-- PDF.js 2.11.338 - Much older but more compatible -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #2a5298;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .pdf-container {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            height: 80vh; /* 80% высоты экрана */
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            overflow: hidden;
        }
        
        .pdf-viewer {
            display: none;
            text-align: center;
            width: 100%;
            height: 100%;
            overflow: auto;
        }
        
        .slide-placeholder {
            color: #333;
            text-align: center;
        }
        
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            margin: 0 15px;
            font-weight: bold;
        }
        
        .page-input {
            display: flex;
            gap: 5px;
        }
        
        .page-input input {
            width: 50px;
            padding: 5px;
            text-align: center;
        }
        
        .thumbnails {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .thumbnail {
            width: 70px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }
        
        .thumbnail.active {
            background: rgba(255,255,255,0.3);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .error {
            background: rgba(255,0,0,0.2);
            border: 1px solid red;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading" id="loading">
            <p>Loading PDF Viewer...</p>
        </div>

        <div id="error-container"></div>
        
        <div class="pdf-container">
            <div class="slide-placeholder" id="slide-placeholder">
                <h2>PDF Presentation</h2>
                <p>The presentation will load here</p>
            </div>
            <div class="pdf-viewer" id="pdf-viewer"></div>
        </div>
        
        <div class="navigation">
            <button class="nav-btn" id="first-btn">First</button>
            <button class="nav-btn" id="prev-btn">Prev</button>
            <div class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">0</span></div>
            <button class="nav-btn" id="next-btn">Next</button>
            <button class="nav-btn" id="last-btn">Last</button>
            <div class="page-input">
                <input type="number" id="page-input" min="1" value="1">
                <button class="nav-btn" id="go-btn">Go</button>
            </div>
        </div>
        
        <div class="thumbnails" id="thumbnails"></div>
    </div>

    <script>
        // Wait for PDF.js to load
        function checkPDFJSLoaded() {
            if (typeof pdfjsLib !== 'undefined') {
                initializeViewer();
            } else {
                setTimeout(checkPDFJSLoaded, 100);
            }
        }
        
        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkPDFJSLoaded);
        } else {
            checkPDFJSLoaded();
        }

        function initializeViewer() {
            console.log('Initializing PDF viewer with compatible settings');
            
            // Use the built-in fake worker to avoid network issues
            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
            
            // Get DOM elements
            var loading = document.getElementById('loading');
            var errorContainer = document.getElementById('error-container');
            var slidePlaceholder = document.getElementById('slide-placeholder');
            var pdfViewer = document.getElementById('pdf-viewer');
            var currentPageEl = document.getElementById('current-page');
            var totalPagesEl = document.getElementById('total-pages');
            var prevBtn = document.getElementById('prev-btn');
            var nextBtn = document.getElementById('next-btn');
            var firstBtn = document.getElementById('first-btn');
            var lastBtn = document.getElementById('last-btn');
            var pageInput = document.getElementById('page-input');
            var goBtn = document.getElementById('go-btn');
            //var thumbnailsContainer = document.getElementById('thumbnails');

            // State variables
            var pdfDoc = null;
            var currentPage = 1;
            var totalPages = 0;
            var scale = 1.2;

            // PDF file path - adjust as needed
            var pdfFilePath = './PDF/Presentation.pdf';

            function showError(message) {
                errorContainer.innerHTML = '<div class="error">' + message + '</div>';
                loading.style.display = 'none';
            }

            function loadPDF() {
                console.log('Loading PDF: ' + pdfFilePath);
                
                // Show loading
                loading.style.display = 'block';
                errorContainer.innerHTML = '';
                
                // Use a try-catch for maximum compatibility
                try {
                    var loadingTask = pdfjsLib.getDocument(pdfFilePath);
                    
                    loadingTask.promise.then(function(pdf) {
                        console.log('PDF loaded successfully');
                        
                        pdfDoc = pdf;
                        totalPages = pdf.numPages;
                        currentPage = 1;
                        
                        // Update UI
                        totalPagesEl.textContent = totalPages;
                        pageInput.max = totalPages;
                        pageInput.value = 1;
                        
                        // Show viewer
                        loading.style.display = 'none';
                        slidePlaceholder.style.display = 'none';
                        pdfViewer.style.display = 'block';
                        
                        // Render first page
                        renderPage(currentPage);
                        //generateThumbnails();
                        updateNavigation();
                        
                    }).catch(function(error) {
                        console.error('PDF loading error:', error);
                        showError('Failed to load PDF: ' + (error.message || 'Unknown error'));
                    });
                } catch (error) {
                    console.error('Exception loading PDF:', error);
                    showError('Exception: ' + error.message);
                }
            }

            function renderPage(pageNum) {
                if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return;
                
                pdfDoc.getPage(pageNum).then(function(page) {
                    var viewport = page.getViewport({scale: scale});
                    
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    var renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    page.render(renderContext).promise.then(function() {
                        pdfViewer.innerHTML = '';
                        pdfViewer.appendChild(canvas);
                        
                        currentPage = pageNum;
                        currentPageEl.textContent = pageNum;
                        pageInput.value = pageNum;
                        
                        updateActiveThumbnail();
                        updateNavigation();
                    });
                }).catch(function(error) {
                    console.error('Error rendering page:', error);
                    showError('Error rendering page: ' + error.message);
                });
            }

            // function generateThumbnails() {
            //     thumbnailsContainer.innerHTML = '';
                
            //     for (var i = 1; i <= totalPages; i++) {
            //         var thumb = document.createElement('div');
            //         thumb.className = 'thumbnail';
            //         thumb.textContent = i;
            //         thumb.setAttribute('data-page', i);
                    
            //         if (i === currentPage) {
            //             thumb.className += ' active';
            //         }
                    
            //         thumb.addEventListener('click', function() {
            //             var pageNum = parseInt(this.getAttribute('data-page'));
            //             renderPage(pageNum);
            //         });
                    
            //         thumbnailsContainer.appendChild(thumb);
            //     }
            // }

            function updateActiveThumbnail() {
                var thumbs = document.querySelectorAll('.thumbnail');
                for (var i = 0; i < thumbs.length; i++) {
                    var pageNum = parseInt(thumbs[i].getAttribute('data-page'));
                    if (pageNum === currentPage) {
                        thumbs[i].className = 'thumbnail active';
                    } else {
                        thumbs[i].className = 'thumbnail';
                    }
                }
            }

            function updateNavigation() {
                prevBtn.disabled = currentPage <= 1;
                firstBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                lastBtn.disabled = currentPage >= totalPages;
            }

            function goToPage(pageNum) {
                if (pageNum >= 1 && pageNum <= totalPages) {
                    renderPage(pageNum);
                }
            }

            // Event listeners
            firstBtn.addEventListener('click', function() { goToPage(1); });
            prevBtn.addEventListener('click', function() { goToPage(currentPage - 1); });
            nextBtn.addEventListener('click', function() { goToPage(currentPage + 1); });
            lastBtn.addEventListener('click', function() { goToPage(totalPages); });
            
            goBtn.addEventListener('click', function() {
                var pageNum = parseInt(pageInput.value);
                goToPage(pageNum);
            });
            
            pageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    var pageNum = parseInt(pageInput.value);
                    goToPage(pageNum);
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (!pdfDoc) return;
                
                switch(e.key) {
                    case 'ArrowLeft':
                    case 'PageUp':
                        if (currentPage > 1) goToPage(currentPage - 1);
                        break;
                    case 'ArrowRight':
                    case 'PageDown':
                    case ' ':
                        if (currentPage < totalPages) goToPage(currentPage + 1);
                        break;
                    case 'Home':
                        goToPage(1);
                        break;
                    case 'End':
                        goToPage(totalPages);
                        break;
                }
            });

            // Start loading the PDF
            setTimeout(loadPDF, 100);
        }
    </script>
</body>
</html>
