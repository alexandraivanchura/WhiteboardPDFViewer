<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Presentation Viewer</title>
    
    <script>
        // Basic polyfills for very old environments
        if (!Array.prototype.at) {
            Array.prototype.at = function(index) {
                var n = index < 0 ? this.length + index : index;
                return this[n];
            };
        }
        
        if (!String.prototype.at) {
            String.prototype.at = function(index) {
                return this.charAt(index >= 0 ? index : this.length + index);
            };
        }
        
        if (typeof structuredClone === 'undefined') {
            window.structuredClone = function(obj) {
                return JSON.parse(JSON.stringify(obj));
            };
        }
    </script>

    <!-- PDF.js 2.11.338 - Much older but more compatible -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2c2c2c, #2c2c2c);
            color: white;
        }
        
        .container {
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        h1 {
            text-align: center;
            margin-right: 20px;
            font-size: 32px;
            justify-self: center;
        }
        
        .pdf-container {
            padding: 20px;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            overflow: hidden;
        }
        
        .pdf-viewer {
            display: none;
            text-align: center;
            width: 100%;
            height: 100%;
            overflow: auto;
        }
        
        .slide-placeholder {
            color: white;
            text-align: center;
            opacity: 0.9;
        }
        
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 15px;
        }
        
        .nav-btn {
            padding: 12px 24px;
            background: rgba(255, 171, 61, 0.199);
            border: 2px solid #FFAA3DFF;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            /* transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); */
        }
        
        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 171, 61, 0.331);
        }
        
        .nav-btn:active {
            transform: translateY(0);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .page-info {
            margin: 0 15px;
            font-weight: bold;
            font-size: 18px;
        }
        
        .page-input {
            display: flex;
            gap: 5px;
        }
        
        .page-input input {
            width: 50px;
            padding: 5px;
            text-align: center;
        }
        
        .thumbnails {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .thumbnail {
            width: 70px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .thumbnail.active {
            background: rgba(255,255,255,0.3);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .error {
            background: rgba(255,0,0,0.2);
            border: 1px solid rgba(255,100,100,0.5);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">        
        <div class="loading" id="loading">
            <p>Loading PDF Viewer...</p>
        </div>

        <div id="error-container"></div>
        
        <div class="pdf-container" id="pdf-container">
            <div class="slide-placeholder" id="slide-placeholder">
                <h2>PDF Presentation</h2>
                <p>The presentation will load here</p>
            </div>
            <div class="pdf-viewer" id="pdf-viewer"></div>
        </div>
        
        <div class="navigation">
            <h1 id="room-title">Комната</h1>
            <button class="nav-btn" id="first-btn">First</button>
            <button class="nav-btn" id="prev-btn">Prev</button>
            <div class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">0</span></div>
            <button class="nav-btn" id="next-btn">Next</button>
            <button class="nav-btn" id="last-btn">Last</button>
        </div>
    </div>

    <script>
        function checkPDFJSLoaded() {
            if (typeof pdfjsLib !== 'undefined') {
                initializeViewer();
            } else {
                setTimeout(checkPDFJSLoaded, 100);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkPDFJSLoaded);
        } else {
            checkPDFJSLoaded();
        }

        function initializeViewer() {
            console.log('Initializing PDF viewer with compatible settings');
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
            
            var loading = document.getElementById('loading');
            var errorContainer = document.getElementById('error-container');
            var slidePlaceholder = document.getElementById('slide-placeholder');
            var pdfViewer = document.getElementById('pdf-viewer');
            var currentPageEl = document.getElementById('current-page');
            var totalPagesEl = document.getElementById('total-pages');
            var prevBtn = document.getElementById('prev-btn');
            var nextBtn = document.getElementById('next-btn');
            var firstBtn = document.getElementById('first-btn');
            var lastBtn = document.getElementById('last-btn');

            var title = document.getElementById('room-title');
            var pdfcontainer = document.getElementById('pdf-container');

            var pdfDoc = null;
            var currentPage = 1;
            var totalPages = 0;
            var scale = 1.2;

            var roomNumber = getCookie("RoomNumber") 
            title.innerText="" + roomNumber;

            var pdfFilePath;

            getRoomPDF();

            function showError(message) {
                errorContainer.innerHTML = '<div class="error">' + message + '</div>';
                loading.style.display = 'none';
            }

            function loadPDF() {
                console.log('Loading PDF: ' + pdfFilePath);
                
                loading.style.display = 'block';
                errorContainer.innerHTML = '';
                
                try {
                    var loadingTask = pdfjsLib.getDocument(pdfFilePath);
                    
                    loadingTask.promise.then(function(pdf) {
                        console.log('PDF loaded successfully');
                        
                        pdfDoc = pdf;
                        totalPages = pdf.numPages;
                        currentPage = 1;
                        
                        // Update UI
                        totalPagesEl.textContent = totalPages;
                        // pageInput.max = totalPages;
                        // pageInput.value = 1;
                        
                        // Show viewer
                        loading.style.display = 'none';
                        slidePlaceholder.style.display = 'none';
                        pdfViewer.style.display = 'block';
                        
                        // Render first page
                        renderPage(currentPage);
                        //generateThumbnails();
                        updateNavigation();
                        
                    }).catch(function(error) {
                        console.error('PDF loading error:', error);
                        showError('Failed to load PDF: ' + (error.message || 'Unknown error'));
                    });
                } catch (error) {
                    console.error('Exception loading PDF:', error);
                    showError('Exception: ' + error.message);
                }
            }

            function renderPage(pageNum) {
                if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return;
                
                pdfDoc.getPage(pageNum).then(function(page) {
                    var viewport = page.getViewport({scale: scale});
                    
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    var renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    page.render(renderContext).promise.then(function() {
                        pdfViewer.innerHTML = '';
                        pdfViewer.appendChild(canvas);
                        
                        currentPage = pageNum;
                        currentPageEl.textContent = pageNum;
                        // pageInput.value = pageNum;
                        
                        updateActiveThumbnail();
                        updateNavigation();
                    });
                }).catch(function(error) {
                    console.error('Error rendering page:', error);
                    showError('Error rendering page: ' + error.message);
                });
            }

            function updateActiveThumbnail() {
                var thumbs = document.querySelectorAll('.thumbnail');
                for (var i = 0; i < thumbs.length; i++) {
                    var pageNum = parseInt(thumbs[i].getAttribute('data-page'));
                    if (pageNum === currentPage) {
                        thumbs[i].className = 'thumbnail active';
                    } else {
                        thumbs[i].className = 'thumbnail';
                    }
                }
            }

            function updateNavigation() {
                prevBtn.disabled = currentPage <= 1;
                firstBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                lastBtn.disabled = currentPage >= totalPages;
            }

            function goToPage(pageNum) {
                if (pageNum >= 1 && pageNum <= totalPages) {
                    renderPage(pageNum);
                }
                updateRoomPageValue(roomNumber, pageNum);
            }

            async function getRoomPageValue() {
                try {
                    const response = await fetch('get-file.php');
                    const result = await response.json();
                    roomData = result.success ? result.data : null;
                } catch (error) {
                    console.error('Error loading room data:', error);
                    roomData = null;
                }

                if (!roomData || !roomData.Rooms) {                    
                    return null;
                }

                const room = roomData.Rooms.find(r => r.Number === roomNumber);

                if (room) { 
                    const value = room ? parseInt(room.PageValue) : null;

                    if (value >= 1 && value <= totalPages) {
                        renderPage(value);
                    }
                }
            }

            setInterval(getRoomPageValue, 500);

            async function getRoomPDF() {
                try {
                    const response = await fetch('get-file.php');
                    const result = await response.json();
                    roomData = result.success ? result.data : null;
                } catch (error) {
                    console.error('Error loading room data:', error);
                    roomData = null;
                }

                if (!roomData || !roomData.Rooms) {                    
                    return null;
                }

                const room = roomData.Rooms.find(r => r.Number === roomNumber);

                if (room) { 
                    try {
                        const res = await room.PDFLink;
                        pdfFilePath = res;
                        loadPDF();
                    } catch (error) {
                        console.error('Error getting PDF link:', error);
                        return null; // или значение по умолчанию
                    }
                }
            }

            async function updateRoomPageValue(roomNumber, newPageValue) {
                try {
                    console.log(`Updating room ${roomNumber} to page ${newPageValue}`);
                    
                    const response = await fetch('data-update.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            roomNumber: roomNumber,
                            newPageValue: '' + newPageValue
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        console.log('Success:', result.message);
                        return true;
                    } else {
                        console.error('Server error:', result.message);
                        return false;
                    }
                } catch (error) {
                    console.error('Network error:', error);
                    return false;
                }
            }

            firstBtn.addEventListener('click', function() { goToPage(1); });
            prevBtn.addEventListener('click', function() { goToPage(currentPage - 1); });
            nextBtn.addEventListener('click', function() { goToPage(currentPage + 1); });
            lastBtn.addEventListener('click', function() { goToPage(totalPages); });    
            pdfcontainer.addEventListener('click', function() { goToPage(currentPage + 1); });       

            document.addEventListener('keydown', function(e) {
                if (!pdfDoc) return;
                
                switch(e.key) {
                    case 'ArrowLeft':
                    case 'PageUp':
                        if (currentPage > 1) goToPage(currentPage - 1);
                        break;
                    case 'ArrowRight':
                    case 'PageDown':
                    case ' ':
                        if (currentPage < totalPages) goToPage(currentPage + 1);
                        break;
                    case 'Home':
                        goToPage(1);
                        break;
                    case 'End':
                        goToPage(totalPages);
                        break;
                }
            });

            setTimeout(loadPDF, 100);
        }

        function setCookie(name, value, days = 1) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i];
                while (cookie.charAt(0) === ' ') {
                    cookie = cookie.substring(1);
                }
                if (cookie.indexOf(nameEQ) === 0) {
                    return cookie.substring(nameEQ.length, cookie.length);
                }
            }
            return null;
        }
    </script>
</body>
</html>
